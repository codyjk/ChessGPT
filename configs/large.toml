# Large config: ~300M params, cloud GPU only
# Only after medium proves the approach

[model]
d_model = 1024
n_layers = 24
n_heads = 16
max_context_length = 200
dropout = 0.15

[training]
lr = 1e-4
num_epochs = 10
batch_size = 16
grad_clip = 1.0
alpha = 0.3
beta = 0.3
checkmate_weight = 5.0
accumulation_steps = 8  # effective batch = 128
patience = 3

[data]
training_file = "data/train_large.csv"
validation_file = "data/val_large.csv"
tokenizer_file = "data/tokenizer_large.json"
